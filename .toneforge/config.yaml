# ToneForge category classifier configuration.
# Maps recipe-name prefixes (before the first '-') to canonical category labels.
# Edit this file to add or rename categories without modifying TypeScript source.
# Schema: prefixToCategory is a flat map of string -> string.

# Combined defaults: main branch provides a small sample of infra labels,
# while the feature branch included a comprehensive category map used by
# classification tests. Preserve both by keeping the classification map as
# the authoritative set (lowercase, hyphenated) and include the additional
# maintenance labels as examples under `examples` to avoid breaking parsing.

prefixToCategory:
  weapon: weapon
  footstep: footstep
  ui: ui
  ambient: ambient
  character: character
  creature: creature
  vehicle: vehicle
  impact: impact
  slam: impact
  rumble: impact
  debris: impact
  rattle: impact
  resonance: impact
  card: card-game

# Examples from origin/main (human-friendly labels) — not used by parser.
examples:
  ui: "User Interface"
  perf: "Performance"
  build: "Build System"
  core: "Core"
  infra: "Infrastructure"
