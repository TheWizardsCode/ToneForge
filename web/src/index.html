<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToneForge Web Demo</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --border: #30363d;
        --text: #e6edf3;
        --text-dim: #8b949e;
        --accent: #58a6ff;
        --green: #3fb950;
        --yellow: #d29922;
        --magenta: #bc8cff;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: "SF Mono", "Cascadia Code", "Fira Code", "Consolas",
          monospace;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
      }

      header {
        flex-shrink: 0;
        display: flex;
        align-items: baseline;
        justify-content: center;
        gap: 0.75rem;
        padding: 1rem 1rem 0.75rem;
        border-bottom: 1px solid var(--border);
      }

      header h1 {
        font-size: 1.5rem;
        color: var(--accent);
        letter-spacing: 0.05em;
      }

      header p {
        color: var(--text-dim);
        font-size: 0.85rem;
      }

      #app {
        flex: 1;
        display: flex;
        flex-direction: column;
        width: 100%;
        overflow: hidden;
      }

      #wizard {
        height: 60%;
        width: 100%;
        overflow-y: auto;
        padding: 1.5rem;
      }

      #panel-divider {
        flex-shrink: 0;
        height: 4px;
        margin-top: 1rem;
        background: var(--border);
        border-top: 1px solid #444c56;
        border-bottom: 1px solid #010409;
      }

      #terminal-container {
        height: 40%;
        width: 100%;
        display: flex;
        flex-direction: column;
        background: #0d1117;
        padding: 0.5rem;
        overflow: hidden;
      }

      #terminal-container .xterm {
        flex: 1;
        height: 100%;
      }

      /* ── Wizard styles ──────────────────────────────────────── */

      .wizard-toolbar {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 0.5rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
      }

      .wizard-demo-selector {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
        color: var(--text-dim);
        margin-right: 0.5rem;
      }

      .wizard-demo-select {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 0.3rem 0.6rem;
        font-family: inherit;
        font-size: 0.8rem;
        cursor: pointer;
      }

      .wizard-demo-select:hover {
        border-color: var(--text-dim);
      }

      .wizard-nav {
        display: flex;
        gap: 0.25rem;
        flex-wrap: wrap;
      }

      .wizard-nav-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-dim);
        padding: 0.4rem 0.8rem;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.8rem;
        transition: all 0.15s;
      }

      .wizard-nav-btn:hover {
        color: var(--text);
        border-color: var(--text-dim);
      }

      .wizard-nav-btn.active {
        background: var(--accent);
        color: var(--bg);
        border-color: var(--accent);
        font-weight: bold;
      }

      .wizard-content {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 1.25rem;
      }

      .wizard-body {
        display: flex;
        gap: 1.25rem;
      }

      .wizard-body-left {
        flex: 1;
        min-width: 0;
      }

      .wizard-body-right {
        flex: 0 0 auto;
        width: 40%;
        min-width: 220px;
      }

      .wizard-step-title {
        font-size: 1.15rem;
        color: var(--magenta);
        margin-bottom: 1rem;
      }

      .wizard-block {
        margin-bottom: 1rem;
        padding: 0.75rem;
        border-radius: 4px;
        border-left: 3px solid;
      }

      .wizard-problem {
        border-left-color: var(--yellow);
        background: rgba(210, 153, 34, 0.08);
      }

      .wizard-solution {
        border-left-color: var(--green);
        background: rgba(63, 185, 80, 0.08);
      }

      .wizard-block-label {
        display: block;
        font-size: 0.75rem;
        font-weight: bold;
        letter-spacing: 0.1em;
        margin-bottom: 0.5rem;
      }

      .wizard-problem .wizard-block-label {
        color: var(--yellow);
      }

      .wizard-solution .wizard-block-label {
        color: var(--green);
      }

      .wizard-block p {
        color: var(--text);
        line-height: 1.5;
        font-size: 0.85rem;
      }

      .wizard-description {
        margin-bottom: 1rem;
      }

      .wizard-description p {
        font-size: 0.85rem;
        line-height: 1.6;
        color: var(--text);
        margin: 0 0 0.75rem 0;
      }

      .wizard-description ol,
      .wizard-description ul {
        font-size: 0.85rem;
        line-height: 1.6;
        color: var(--text);
        margin: 0 0 0.75rem 0;
        padding-left: 1.5rem;
      }

      .wizard-description li {
        margin-bottom: 0.25rem;
      }

      .wizard-commands {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 0.75rem;
        margin-bottom: 1rem;
      }

      .wizard-cmd-line {
        margin-bottom: 0.4rem;
      }

      .wizard-cmd-line code {
        font-size: 0.8rem;
        color: var(--accent);
      }

      .wizard-btn {
        border: 1px solid var(--border);
        padding: 0.5rem 1rem;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.85rem;
        transition: all 0.15s;
      }

      .wizard-btn-run {
        background: var(--green);
        color: var(--bg);
        border-color: var(--green);
        font-weight: bold;
        margin-top: 0.5rem;
      }

      .wizard-btn-run:hover {
        opacity: 0.85;
      }

      .wizard-btn-prev,
      .wizard-btn-next {
        background: transparent;
        color: var(--text-dim);
      }

      .wizard-btn-prev:hover,
      .wizard-btn-next:hover {
        color: var(--text);
        border-color: var(--text);
      }

      .wizard-nav-bar {
        display: flex;
        align-items: center;
        margin-top: 1rem;
        padding-top: 0.75rem;
        border-top: 1px solid var(--border);
      }

      .wizard-commentary {
        margin-top: 0.75rem;
        padding: 0.75rem;
        background: rgba(139, 148, 158, 0.06);
        border-radius: 4px;
      }

      .wizard-commentary p {
        color: var(--text-dim);
        font-size: 0.8rem;
        line-height: 1.5;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>ToneForge Web Demo</h1>
      <p>Placeholder audio at the speed of development</p>
    </header>
    <div id="app">
      <div id="wizard"></div>
      <div id="panel-divider"></div>
      <div id="terminal-container"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
