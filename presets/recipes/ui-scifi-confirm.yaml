version: "0.1"
meta:
  name: "UI Sci-Fi Confirm"
  description: "Small confirm chime used by web demo (ui-scifi-confirm)."
  duration: 0.6
nodes:
  osc:
    kind: oscillator
    params:
      type: sine
      frequency: 880
  env:
    kind: envelope
    params:
      attack: 0.001
      decay: 0.18
      sustain: 0
      release: 0.01
  gain:
    kind: gain
    params:
      gain: 0.6
  dest:
    kind: destination
routing:
  - chain: [osc, env, gain, dest]
